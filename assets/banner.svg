<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="1" stroke-opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <ellipse cx="470" cy="118" rx="260" ry="120" fill="url(#glow)"/>

  <!-- wordmark -->
  <text x="138" y="132" font-size="78" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#ice)">cold</tspan><tspan fill="url(#ember)">forge</tspan>
  </text>
  <text x="142" y="176" font-size="25" fill="#cbd5e1">Honest, local-first cold outreach — research to reply, zero SaaS.</text>

  <!-- CLI + MCP pill -->
  <g transform="translate(1010,70)">
    <rect width="208" height="44" rx="22" fill="#111c33" stroke="#334155"/>
    <circle cx="28" cy="22" r="6" fill="url(#ember)"/>
    <text x="48" y="29" font-size="20" font-weight="600" fill="#e2e8f0" font-family="'Cascadia Code', Consolas, monospace">CLI + MCP</text>
  </g>

  <!-- pipeline -->
  <line x1="150" y1="258" x2="1130" y2="258" stroke="url(#pipe)" stroke-width="3"/>
  <g font-family="'Cascadia Code', Consolas, monospace" font-size="18" fill="#cbd5e1" text-anchor="middle">
    <g>
      <circle cx="150" cy="258" r="11" fill="#38bdf8" stroke="#0a0f1c" stroke-width="3"/>
      <text x="150" y="304">research</text>
    </g>
    <g>
      <circle cx="395" cy="258" r="11" fill="#818cf8" stroke="#0a0f1c" stroke-width="3"/>
      <text x="395" y="304">personalize</text>
    </g>
    <g>
      <circle cx="640" cy="258" r="11" fill="#a78bfa" stroke="#0a0f1c" stroke-width="3"/>
      <text x="640" y="304">sequence</text>
    </g>
    <g>
      <circle cx="885" cy="258" r="11" fill="#fb923c" stroke="#0a0f1c" stroke-width="3"/>
      <text x="885" y="304">send</text>
    </g>
    <g>
      <circle cx="1130" cy="258" r="11" fill="#f59e0b" stroke="#0a0f1c" stroke-width="3"/>
      <text x="1130" y="304">follow</text>
    </g>
  </g>

  <text x="142" y="344" font-size="15" fill="#64748b" font-family="'Cascadia Code', Consolas, monospace">SQLite · MIT · degrades gracefully with zero API keys · safe-send guardrails built in</text>
</svg>
